server:
  host: "0.0.0.0"
  port: 6006
  debug: false
  debug_sse_output: false

database:
  url: "postgresql+asyncpg://postgres:postgres@localhost:5432/ai_platform"
  pool_size: 10
  max_overflow: 20

redis:
  url: "redis://localhost:6379/0"
  default_ttl: 3600

security:
  enable_auth: true
  api_key: ""
  jwt_secret: ""
  jwt_algorithm: "HS256"
  max_body_size: 10485760

rate_limit:
  enabled: true
  default:
    requests: 100
    window_seconds: 60
  endpoints:
    /api/v1/chat:
      requests: 30
      window_seconds: 60
    /api/v1/kb/query:
      requests: 50
      window_seconds: 60
  exempt_paths:
    - "/api/v1/health"
    - "/metrics"

logging:
  level: "INFO"
  format: "json"
  otel_enabled: false
  otel_endpoint: "http://localhost:4317"

text_model:
  text_model_provider: "qwen_cloud"
  qwen_api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  qwen_model_name: "qwen-plus"
  text_vllm_base_url: ""
  text_vllm_model: "Qwen3.5-9B"
  text_timeout: 120
  task_provider:
    intent: ""
    rag_rewrite: ""
    rag_merge: ""
    final: ""
    chat: ""

vision_model:
  vision_provider: "qwen_cloud"
  vllm_base_url: ""
  vllm_model: "Qwen3.5-9B"
  vllm_api_key: ""
  vision_timeout: 120
  image_max_pixels: 524288
  image_min_dim: 224
  download_timeout: 30
  qwen_vision_model_name: "qwen-vl-plus"

embedding:
  base_url: ""
  model: "bge-m3"
  dim: 1024
  distance: "Cosine"
  timeout: 60
  embedding_provider: "qwen_cloud"
  qwen_embedding_model_name: "text-embedding-v3"
  vllm_api_key: ""
  batch_size: 10
  max_chunks: 100
  default_chunk_size: 500
  default_chunk_overlap: 50

qdrant:
  url: "http://localhost:6333"
  timeout: 30
  sparse_vector_name: "bm25"

concurrency:
  llm_semaphore_size: 20
  multimodal_semaphore_size: 10
  embedding_semaphore_size: 20
  semaphore_acquire_timeout: 120

knowledge:
  collections:
    - name: "general"
      description: "通用知识库"
      vector_dim: 1024
      distance: "Cosine"
      sparse_vector: true
      payload_indexes:
        - field: "doc_type"
          type: "keyword"
        - field: "source"
          type: "keyword"
        - field: "tag"
          type: "keyword"
        - field: "uploader"
          type: "keyword"
        - field: "doc_id"
          type: "keyword"
      default_chunk_size: 500
      default_chunk_overlap: 50

    - name: "safety"
      description: "安全隐患文档库"
      vector_dim: 1024
      distance: "Cosine"
      sparse_vector: true
      payload_indexes:
        - field: "doc_type"
          type: "keyword"
        - field: "source"
          type: "keyword"
        - field: "tag"
          type: "keyword"
        - field: "uploader"
          type: "keyword"
        - field: "doc_id"
          type: "keyword"
      default_chunk_size: 500
      default_chunk_overlap: 50

  retrieval:
    default_top_k: 3
    default_score_threshold: 0.5
    enable_hybrid: true
    hybrid_alpha: 0.7
    enable_rerank: false

context:
  redis_cache_ttl: 3600
  default_max_tokens: 4096
  default_strategy: "recent_priority"

agent:
  max_iterations: 10
  planning_prompt: "agent/planning"
  synthesis_prompt: "agent/synthesis"

workflow:
  max_concurrent_nodes: 5

task_queue:
  redis_queue_name: "arq:tasks"
  max_retries: 3
  retry_delay: 60

safety:
  safety_keywords: ""
  entity_max_count: 3
  hazard_max_count: 3

sse:
  heartbeat_interval: 15

circuit_breaker:
  failure_threshold: 5
  recovery_timeout: 30
  half_open_max_calls: 1

prompt_config:
  prompts_dir: "./prompts"
  prompts_default_dir: "./prompts/prompts_default"

intent:
  layers:
    keyword:
      enabled: true
      rules:
        - intent: qa
          keywords: ["什么是", "怎么用", "如何", "解释"]
        - intent: task
          keywords: ["帮我", "执行", "创建", "删除"]
        - intent: chat
          keywords: ["你好", "闲聊", "聊聊"]
        - intent: retrieve_only
          keywords: ["搜索", "查找", "检索"]
      confidence_threshold: 0.9
    similarity:
      enabled: true
      top_k: 3
      score_threshold: 0.85
      representatives:
        qa: "知识问答，解释概念，如何使用"
        task: "执行任务，帮我做某事，创建或删除"
        chat: "闲聊，打招呼，日常对话"
        retrieve_only: "搜索文档，查找信息，检索资料"
    llm:
      enabled: true
      model_routing: intent
  multi_intent:
    enabled: true
    max_intents: 3
  fallback_intent: chat
  max_input_length: 1000
  timeout: 5.0

json_repair:
  enabled: true

mcp_servers: []